<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    width: 600px;
    height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0px;
  }

  /* Lightning bolt as the "A" replacement */
  .bolt {
    position: relative;
    margin-right: -6px;
    z-index: 2;
  }
  .bolt svg {
    filter: drop-shadow(0 0 8px #e50000) drop-shadow(0 0 20px #e50000);
  }

  .wordmark {
    font-family: 'Black Ops One', 'Arial Black', sans-serif;
    font-size: 88px;
    font-style: italic;
    letter-spacing: -2px;
    color: #e50000;
    text-transform: uppercase;
    text-shadow:
      0 0 10px #e50000,
      0 0 25px #aa0000,
      3px 3px 0px #4a0000;
    line-height: 1;
    position: relative;
  }

  /* Sharp diagonal cut effect on each letter group */
  .wordmark span {
    display: inline-block;
    position: relative;
  }

  /* Slash cuts between letters */
  .cut {
    display: inline-block;
    width: 3px;
    height: 88px;
    background: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
    transform: skewX(-15deg);
    margin: 0 1px;
    position: relative;
    top: 4px;
  }

  .project-label {
    font-family: 'Black Ops One', sans-serif;
    font-size: 11px;
    letter-spacing: 14px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<div class="project-label">PROJECT</div>
<div class="wrap">
  <div class="wordmark">AETHER</div>
</div>
</body>
</html>
