<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4400;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="160" fill="#080000"/>

  <!-- Sound wave bars (left) -->
  <g filter="url(#glow)" opacity="0.85">
    <rect x="18" y="58" width="4" height="44" rx="2" fill="url(#redGrad)"/>
    <rect x="26" y="46" width="4" height="68" rx="2" fill="url(#redGrad)"/>
    <rect x="34" y="38" width="4" height="84" rx="2" fill="url(#redGrad)"/>
    <rect x="42" y="52" width="4" height="56" rx="2" fill="url(#redGrad)"/>
    <rect x="50" y="62" width="4" height="36" rx="2" fill="url(#redGrad)"/>
    <rect x="58" y="44" width="4" height="72" rx="2" fill="url(#redGrad)"/>
    <rect x="66" y="56" width="4" height="48" rx="2" fill="url(#redGrad)"/>
  </g>

  <!-- Sound wave bars (right) -->
  <g filter="url(#glow)" opacity="0.85">
    <rect x="330" y="56" width="4" height="48" rx="2" fill="url(#redGrad)"/>
    <rect x="338" y="44" width="4" height="72" rx="2" fill="url(#redGrad)"/>
    <rect x="346" y="62" width="4" height="36" rx="2" fill="url(#redGrad)"/>
    <rect x="354" y="52" width="4" height="56" rx="2" fill="url(#redGrad)"/>
    <rect x="362" y="38" width="4" height="84" rx="2" fill="url(#redGrad)"/>
    <rect x="370" y="46" width="4" height="68" rx="2" fill="url(#redGrad)"/>
    <rect x="378" y="58" width="4" height="44" rx="2" fill="url(#redGrad)"/>
  </g>

  <!-- Main text: PROJECT -->
  <text x="200" y="78"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="10"
    text-anchor="middle"
    fill="#aaaaaa">PROJECT</text>

  <!-- Main text: AETHER -->
  <text x="200" y="118"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="40"
    letter-spacing="8"
    text-anchor="middle"
    fill="url(#redGrad)"
    filter="url(#glow)">AETHER</text>

  <!-- Thin line under AETHER -->
  <line x1="90" y1="128" x2="310" y2="128" stroke="#e50000" stroke-width="0.75" opacity="0.5"/>
</svg>
