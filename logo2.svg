<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e50000"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="160" fill="#080000"/>

  <!-- Circle / orbit ring -->
  <circle cx="200" cy="80" r="54" fill="none" stroke="#e50000" stroke-width="0.8" opacity="0.4"/>
  <circle cx="200" cy="80" r="42" fill="none" stroke="#e50000" stroke-width="0.4" opacity="0.2"/>

  <!-- A symbol made of triangles (aether symbol) -->
  <polygon points="200,28 220,62 180,62" fill="none" stroke="url(#g2)" stroke-width="1.5" filter="url(#glow2)"/>
  <line x1="182" y1="58" x2="218" y2="58" stroke="#e50000" stroke-width="1" opacity="0.6"/>

  <!-- Text -->
  <text x="200" y="105"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="28"
    letter-spacing="10"
    text-anchor="middle"
    fill="url(#g2)"
    filter="url(#glow2)">AETHER</text>

  <text x="200" y="125"
    font-family="Arial, sans-serif"
    font-weight="300"
    font-size="9"
    letter-spacing="8"
    text-anchor="middle"
    fill="#666">PROJECT</text>
</svg>
