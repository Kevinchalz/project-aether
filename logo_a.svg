<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <radialGradient id="cosmosGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e50000;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#8b0000;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#080000;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4400"/>
      <stop offset="100%" style="stop-color:#e50000"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hardGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="300" height="300" fill="#080000"/>

  <!-- Background glow -->
  <circle cx="150" cy="140" r="100" fill="url(#cosmosGrad)" opacity="0.5"/>

  <!-- Star field -->
  <circle cx="40" cy="30" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="80" cy="20" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="120" cy="50" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="200" cy="25" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="250" cy="45" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="270" cy="80" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="30" cy="100" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="285" cy="200" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="15" cy="220" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="60" cy="280" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="240" cy="270" r="1.2" fill="#fff" opacity="0.6"/>

  <!-- Outer orbit ring -->
  <ellipse cx="150" cy="140" rx="95" ry="30" fill="none" stroke="#e50000" stroke-width="0.6" opacity="0.3" transform="rotate(-15, 150, 140)"/>

  <!-- Inner orbit ring -->
  <ellipse cx="150" cy="140" rx="70" ry="20" fill="none" stroke="#e50000" stroke-width="0.5" opacity="0.2" transform="rotate(20, 150, 140)"/>

  <!-- Big stylized A — outer structure -->
  <polygon points="150,45 245,215 55,215"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="3"
    stroke-linejoin="round"
    filter="url(#softGlow)"/>

  <!-- A crossbar -->
  <line x1="100" y1="170" x2="200" y2="170"
    stroke="url(#lineGrad)"
    stroke-width="3"
    filter="url(#softGlow)"/>

  <!-- Inner A fill with cosmic gradient -->
  <polygon points="150,65 230,205 70,205"
    fill="#080000"
    opacity="0.95"/>

  <!-- Sound wave lines inside the A -->
  <g filter="url(#hardGlow)" opacity="0.9">
    <line x1="118" y1="185" x2="118" y2="165" stroke="#e50000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="128" y1="185" x2="128" y2="150" stroke="#e50000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="138" y1="185" x2="138" y2="140" stroke="#e50000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="148" y1="185" x2="148" y2="130" stroke="#ff4400" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="158" y1="185" x2="158" y2="140" stroke="#e50000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="168" y1="185" x2="168" y2="150" stroke="#e50000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="178" y1="185" x2="178" y2="165" stroke="#e50000" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Dot at apex (planet) -->
  <circle cx="150" cy="45" r="5" fill="#e50000" filter="url(#softGlow)"/>
  <circle cx="150" cy="45" r="2.5" fill="#ff8800"/>

  <!-- Text below -->
  <text x="150" y="250"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="13"
    letter-spacing="12"
    text-anchor="middle"
    fill="#e50000"
    filter="url(#hardGlow)">PROJECT</text>

  <text x="150" y="272"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="18"
    letter-spacing="10"
    text-anchor="middle"
    fill="#ffffff">AETHER</text>
</svg>
