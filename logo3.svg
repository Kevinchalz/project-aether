<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50000"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="160" fill="#080000"/>

  <!-- Slash/strike accent -->
  <line x1="78" y1="30" x2="108" y2="130" stroke="#e50000" stroke-width="2" opacity="0.7" filter="url(#glow3)"/>

  <!-- P·A stacked monogram -->
  <text x="98" y="90"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="72"
    letter-spacing="-4"
    fill="#111">PA</text>

  <text x="98" y="90"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="72"
    letter-spacing="-4"
    fill="none"
    stroke="url(#g3)"
    stroke-width="1.2"
    filter="url(#glow3)">PA</text>

  <!-- Right side text -->
  <text x="205" y="72"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="26"
    letter-spacing="6"
    fill="#ffffff">PROJECT</text>

  <text x="205" y="102"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="26"
    letter-spacing="6"
    fill="url(#g3)"
    filter="url(#glow3)">AETHER</text>

  <line x1="205" y1="110" x2="370" y2="110" stroke="#e50000" stroke-width="0.5" opacity="0.4"/>
  <text x="205" y="122"
    font-family="Arial, sans-serif"
    font-size="8"
    letter-spacing="5"
    fill="#555">DJ · PRODUCER · PERFORMER</text>
</svg>
