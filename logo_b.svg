<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <radialGradient id="bgGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0000"/>
      <stop offset="100%" style="stop-color:#080000"/>
    </radialGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4400"/>
      <stop offset="100%" style="stop-color:#e50000"/>
    </linearGradient>
    <filter id="gGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="300" height="300" fill="url(#bgGrad2)"/>

  <!-- Rotating rings (Saturn-like) -->
  <ellipse cx="150" cy="150" rx="110" ry="35" fill="none" stroke="#e50000" stroke-width="1" opacity="0.15" transform="rotate(-10,150,150)"/>
  <ellipse cx="150" cy="150" rx="90" ry="28" fill="none" stroke="#e50000" stroke-width="0.8" opacity="0.2" transform="rotate(-10,150,150)"/>
  <ellipse cx="150" cy="150" rx="70" ry="22" fill="none" stroke="#e50000" stroke-width="0.6" opacity="0.15" transform="rotate(-10,150,150)"/>

  <!-- Central glowing orb -->
  <circle cx="150" cy="150" r="52" fill="#080000"/>
  <circle cx="150" cy="150" r="52" fill="none" stroke="#e50000" stroke-width="1.5" opacity="0.7" filter="url(#gGlow)"/>
  <circle cx="150" cy="150" r="48" fill="none" stroke="#ff4400" stroke-width="0.5" opacity="0.4"/>

  <!-- Red inner glow -->
  <circle cx="150" cy="150" r="40" fill="#1a0000" opacity="0.8"/>
  <circle cx="150" cy="150" r="30" fill="#2a0000" opacity="0.6"/>

  <!-- Sound wave bars inside orb -->
  <g filter="url(#gGlow)">
    <rect x="112" y="140" width="5" height="20" rx="2.5" fill="url(#waveGrad)" opacity="0.7"/>
    <rect x="121" y="130" width="5" height="40" rx="2.5" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="130" y="122" width="5" height="56" rx="2.5" fill="url(#waveGrad)"/>
    <rect x="139" y="115" width="5" height="70" rx="2.5" fill="url(#waveGrad)" filter="url(#gGlow)"/>
    <rect x="148" y="122" width="5" height="56" rx="2.5" fill="url(#waveGrad)"/>
    <rect x="157" y="130" width="5" height="40" rx="2.5" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="166" y="140" width="5" height="20" rx="2.5" fill="url(#waveGrad)" opacity="0.7"/>
  </g>

  <!-- Stars scattered -->
  <circle cx="30" cy="40" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="55" cy="20" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="270" cy="35" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="250" cy="60" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="20" cy="200" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="280" cy="220" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="45" cy="260" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="260" cy="275" r="0.8" fill="#fff" opacity="0.3"/>

  <!-- PROJECT AETHER text -->
  <text x="150" y="238"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="9"
    letter-spacing="10"
    text-anchor="middle"
    fill="#888">PROJECT</text>

  <text x="150" y="262"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="20"
    letter-spacing="8"
    text-anchor="middle"
    fill="#e50000"
    filter="url(#gGlow)">AETHER</text>

  <!-- Small tagline -->
  <text x="150" y="280"
    font-family="Arial, sans-serif"
    font-size="7"
    letter-spacing="5"
    text-anchor="middle"
    fill="#444">DJ · PRODUCER</text>
</svg>
