<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50000"/>
      <stop offset="100%" style="stop-color:#ff4400"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="160" fill="#080000"/>

  <!-- Cosmos dot cluster (stars) -->
  <circle cx="30" cy="25" r="1" fill="#e50000" opacity="0.6"/>
  <circle cx="45" cy="15" r="0.8" fill="#ff4400" opacity="0.4"/>
  <circle cx="20" cy="40" r="0.6" fill="#fff" opacity="0.3"/>
  <circle cx="370" cy="140" r="1" fill="#e50000" opacity="0.6"/>
  <circle cx="358" cy="148" r="0.8" fill="#ff4400" opacity="0.4"/>
  <circle cx="380" cy="130" r="0.6" fill="#fff" opacity="0.3"/>
  <circle cx="15" cy="130" r="0.8" fill="#e50000" opacity="0.3"/>
  <circle cx="385" cy="30" r="1" fill="#e50000" opacity="0.5"/>

  <!-- Horizontal red line accent (top) -->
  <line x1="60" y1="52" x2="340" y2="52" stroke="#e50000" stroke-width="0.5" opacity="0.25"/>

  <!-- Main AETHER — huge, centered, outline style -->
  <text x="200" y="108"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="56"
    letter-spacing="14"
    text-anchor="middle"
    fill="none"
    stroke="#333"
    stroke-width="3">AETHER</text>

  <text x="200" y="108"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="56"
    letter-spacing="14"
    text-anchor="middle"
    fill="url(#g4)"
    filter="url(#glow4)">AETHER</text>

  <!-- PROJECT above, small -->
  <text x="200" y="44"
    font-family="Arial, sans-serif"
    font-weight="300"
    font-size="11"
    letter-spacing="16"
    text-anchor="middle"
    fill="#888">PROJECT</text>

  <!-- Bottom line -->
  <line x1="60" y1="118" x2="340" y2="118" stroke="#e50000" stroke-width="0.5" opacity="0.25"/>
</svg>
